name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Export web bundle
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: your_api_key
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          EXPO_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:000000000000'
